<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridwan — Futuristic Portfolio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top glass">
  <div class="container">

    <a class="navbar-brand brand-text" href="/">RAS.</a>

    <!-- 🔥 TOGGLE FIX -->
    <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <div class="ms-auto nav-links">
        <a href="/gallery">Work</a>
        <a href="/tentang">About</a>
        <a href="/kontak">Contact</a>

        <label class="switch ms-3">
          <input type="checkbox" id="theme-toggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>

  </div>
</nav>

<main id="page">
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <div class="container">
    <p>© <span id="year"></span> Ridwan Arifin Shoheh. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const toggle = document.getElementById("theme-toggle");
let theme = localStorage.getItem("theme") || "dark";

applyTheme(theme);
toggle.checked = theme === "light";

toggle.addEventListener("change", () => {
  const newTheme = toggle.checked ? "light" : "dark";
  applyTheme(newTheme);
  localStorage.setItem("theme", newTheme);
});

function applyTheme(mode) {
  document.body.classList.toggle("light-mode", mode === "light");
}

document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
